services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: learning-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learning_system}
      POSTGRES_USER: ${POSTGRES_USER:-learning_system}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learning_system}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learning_system} -d ${POSTGRES_DB:-learning_system}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learning-system-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: learning-system-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-learning_system}:${POSTGRES_PASSWORD:-learning_system}@postgres:5432/${POSTGRES_DB:-learning_system}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/data/workspace}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      APP_NAME: ${APP_NAME:-learning-system}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-ChangeMe123!}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-admin@example.com}
      OBSIDIAN_HEADLESS_PATH: ${OBSIDIAN_HEADLESS_PATH:-obsidian-headless}
      OBSIDIAN_VAULT: ${OBSIDIAN_VAULT:-}
      OBSIDIAN_CONFIG_DIR: ${OBSIDIAN_CONFIG_DIR:-}
      OBSIDIAN_DEVICE_NAME: ${OBSIDIAN_DEVICE_NAME:-}
    volumes:
      - ${WORKSPACE_HOST_PATH:-./workspace}:${WORKSPACE_ROOT:-/data/workspace}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: learning-system-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-learning_system}:${POSTGRES_PASSWORD:-learning_system}@postgres:5432/${POSTGRES_DB:-learning_system}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/data/workspace}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - ${WORKSPACE_HOST_PATH:-./workspace}:${WORKSPACE_ROOT:-/data/workspace}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "--loglevel=INFO"]

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: learning-system-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://${POSTGRES_USER:-learning_system}:${POSTGRES_PASSWORD:-learning_system}@postgres:5432/${POSTGRES_DB:-learning_system}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/data/workspace}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - ${WORKSPACE_HOST_PATH:-./workspace}:${WORKSPACE_ROOT:-/data/workspace}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=INFO"]

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    container_name: learning-system-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  redis_data:
